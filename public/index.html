<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueCrowd | Smart Event Optimizer</title>
    
    <!-- Meta tags for SEO & Security -->
    <meta name="description" content="Revolutionizing event experiences with real-time crowd management and navigation using Google Maps API.">
    <meta name="theme-color" content="#0f172a">

    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #22d3ee;
            --bg-dark: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #cbd5e1; /* Improved contrast: was #94a3b8 */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.1);
            --focus-ring: 2px solid var(--secondary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s, transform 0.1s;
        }

        /* Accessibility: Visual focus for keyboard users */
        *:focus-visible {
            outline: var(--focus-ring);
            outline-offset: 2px;
        }

        /* Skip to content link */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary);
            color: white;
            padding: 8px;
            z-index: 2000;
            transition: top 0.3s;
        }
        .skip-link:focus { top: 0; }

        body {
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            font-weight: 600;
        }

        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }

        nav.sidebar {
            background: var(--bg-dark);
            border-right: 1px solid var(--glass);
            overflow-y: auto;
            padding: 1.5rem;
        }

        .panel {
            background: var(--surface);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass);
            backdrop-filter: blur(5px);
        }

        .panel-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--glass);
            padding-bottom: 0.5rem;
        }

        .zone-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0.5rem;
            margin: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            cursor: pointer;
        }
        .zone-card:hover, .zone-card:focus { background: var(--glass); outline: none; }

        .density-tag {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .low { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .high { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        #map-container { position: relative; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }

        .floating-controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 10;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) { filter: brightness(1.2); transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary { background: var(--surface); border: 1px solid var(--glass); }
        .btn-calendar { background: #4285F4; }

        #notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            padding: 1.25rem;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            width: 320px;
        }
        #notification.show { transform: translateY(0); }

        /* Modal Styling */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--glass);
            width: 400px;
            max-width: 90%;
        }

        label { display: block; font-size: 0.8rem; margin-bottom: 0.25rem; color: var(--text-muted); }
        select, input[type="text"], input[type="number"] {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--glass);
            padding: 0.65rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 1rem;
            outline: none;
        }

        .loader {
            width: 14px; height: 14px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: var(--secondary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { position: absolute; bottom: 0; width: 100%; height: 350px; z-index: 20; border-top: 1px solid var(--glass); }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <div class="logo" aria-label="Venue Crowe Home">VenueCrowd <span aria-hidden="true" style="font-size: 0.9rem; opacity: 0.5;">v2.1 Premium Access</span></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="user-profile" style="display: none; align-items: center; gap: 8px;">
                <img src="https://lh3.googleusercontent.com/a/default-user" alt="User Profile" style="width: 32px; height: 32px; border-radius: 50%;">
                <span id="user-name" style="font-size: 0.85rem;">Attendee</span>
            </div>
            <button class="btn btn-secondary" onclick="googleAuth()" id="auth-btn" aria-label="Sign in with Google">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" style="width: 16px;" alt="" aria-hidden="true"> Sign In
            </button>
            <div id="connection-status" role="status" aria-live="polite" style="font-size: 0.75rem;">
                <span class="loader" style="display: inline-block; vertical-align: middle;"></span> Connecting...
            </div>
        </div>
    </header>

    <main class="main-container" id="main-content">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" aria-label="Venue Navigation and Tools">
            <section class="panel" aria-labelledby="ai-title">
                <h2 id="ai-title" class="panel-title">🧠 Google Assistant</h2>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="ai-query" placeholder="Ask: 'Where is the food?'" aria-label="Ask Google AI">
                    <button class="btn" onclick="askAssistant()" style="padding: 10px; height: 42px;" aria-label="Submit query">🚀</button>
                </div>
                <div id="ai-response" role="log" aria-live="polite" style="margin-top: 10px; font-size: 0.75rem; color: var(--secondary); background: rgba(34, 211, 238, 0.05); padding: 10px; border-radius: 6px; display: none;"></div>
            </section>

            <section class="panel" aria-labelledby="crowd-title">
                <h2 id="crowd-title" class="panel-title">Venue Crowd Density</h2>
                <div id="crowd-list" role="list" aria-live="polite">
                    <p style="color: var(--text-muted)">Monitoring live zones...</p>
                </div>
            </section>

            <section class="panel" aria-labelledby="cal-title">
                <h2 id="cal-title" class="panel-title">Event Schedule</h2>
                <div style="font-size: 0.9rem; margin-bottom: 1rem;">
                    <strong>Championship Final 🏆</strong><br>
                    <span style="color: var(--text-muted)">Sunday, May 10th - Kickoff 18:00</span>
                </div>
                <button class="btn btn-calendar" style="width: 100%" onclick="syncCalendar()" aria-label="Sync event to Google Calendar">
                    <span>📅</span> Add to Google Calendar
                </button>
            </section>

            <section class="panel" aria-labelledby="route-title">
                <h2 id="route-title" class="panel-title">Smart Optimization</h2>
                <label for="start-node">Current Point</label>
                <select id="start-node">
                    <option value="gate_a">Main Gate A</option>
                    <option value="gate_b">North Gate B</option>
                </select>
                <label for="end-node">Destination</label>
                <select id="end-node">
                    <option value="seating_zone_1">Lower Tier Seating</option>
                    <option value="food_court">Central Food Court</option>
                </select>
                <button class="btn" style="width: 100%" onclick="getSmartRoute()" aria-label="Calculate crowd-optimized route">
                    🚀 Find Smartest Route
                </button>

                <div id="route-panel" style="display: none; margin-top: 1rem; padding: 12px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); border-radius: 8px;">
                    <strong style="color: var(--secondary)">AI Recommendation</strong>
                    <p id="route-text" style="font-size: 0.8rem; line-height: 1.4; margin-top: 5px;"></p>
                </div>
            </section>
        </nav>

        <!-- Dynamic Map View -->
        <div id="map-container" role="application" aria-label="Interactive Venue Map">
            <div id="map"></div>
            <div class="floating-controls">
                <button class="btn btn-secondary" onclick="simulateAlert()" aria-label="Admin: Broadcast Alert">
                    🚨 Emergency Sim
                </button>
                <button class="btn btn-secondary" onclick="toggleAdminModal(true)" aria-label="Open Simulation Settings">
                    ⚙️ Admin Control
                </button>
            </div>
        </div>
    </main>

    <!-- Accessible Notification Overlay -->
    <div id="notification" role="alert" aria-live="assertive">
        <h3 id="notif-title" style="font-size: 1rem; margin-bottom: 4px;">System Update</h3>
        <p id="notif-msg" style="color: var(--text-muted); font-size: 0.85rem;"></p>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="modal-overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Simulation Settings</h2>
            <label for="admin-zone">Target Zone</label>
            <select id="admin-zone">
                <option value="gate_a">Main Gate A</option>
                <option value="gate_b">North Gate B</option>
                <option value="food_court">Food Court</option>
            </select>
            <label for="admin-density">Simulated Density (%)</label>
            <input type="number" id="admin-density" min="0" max="100" value="85">
            <div style="display: flex; gap: 10px; margin-top: 1rem;">
                <button class="btn btn-secondary" style="flex: 1" onclick="toggleAdminModal(false)">Cancel</button>
                <button class="btn" style="flex: 1" onclick="submitAdminUpdate()">Apply</button>
            </div>
        </div>
    </div>

    <!-- Google Maps script is inserted after logic -->
    <script>
        const GOOGLE_API_KEY = "REPLACE_WITH_YOUR_KEY"; 
        let map, markers = [];

        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_API_KEY}&callback=initMap`;
            script.async = true;
            script.onerror = () => {
                document.getElementById('connection-status').innerHTML = "🔴 Maps API Error";
            };
            document.head.appendChild(script);
        }

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -37.8198, lng: 144.9834 },
                zoom: 17,
                disableDefaultUI: true,
                styles: [
                  { "elementType": "geometry", "stylers": [{ "color": "#0f172a" }] },
                  { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
                  { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] }
                ]
            });
            fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/venue/crowd');
                if (!response.ok) throw new Error('Offline');
                const data = await response.json();
                updateUI(data);
                document.getElementById('connection-status').innerHTML = "🟢 Service Live";
            } catch (e) {
                document.getElementById('connection-status').innerHTML = "🔴 System Offline";
            }
        }

        function updateUI(zones) {
            const list = document.getElementById('crowd-list');
            list.innerHTML = '';
            markers.forEach(m => m.setMap(null));
            markers = [];

            zones.forEach(zone => {
                const card = document.createElement('div');
                card.className = 'zone-card';
                card.role = 'listitem';
                card.tabIndex = 0;
                card.ariaLabel = `${zone.name}, Status: ${zone.status}, Density: ${zone.density}%`;
                card.innerHTML = `
                    <span style="font-weight: 500">${zone.name}</span>
                    <span class="density-tag ${zone.status.toLowerCase()}">${zone.status}</span>
                `;
                card.onkeypress = (e) => { if(e.key === 'Enter') focusOnZone(zone); };
                card.onclick = () => focusOnZone(zone);
                list.appendChild(card);

                if (map) {
                    const marker = new google.maps.Marker({
                        position: { lat: -37.8198 + (Math.random() * 0.002 - 0.001), lng: 144.9834 + (Math.random() * 0.004 - 0.002) },
                        map: map,
                        title: `${zone.name}`,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 10 + (zone.density / 10),
                            fillColor: zone.status === 'High' ? "#ef4444" : (zone.status === 'Medium' ? "#f59e0b" : "#10b981"),
                            fillOpacity: 0.7,
                            strokeWeight: 2,
                            strokeColor: "#ffffff"
                        }
                    });
                    markers.push(marker);
                }
            });
        }

        function focusOnZone(zone) {
            showNotification("Zone Insight", `${zone.name} is currently ${zone.status}. Optimization suggests Gate B for entries.`);
        }

        async function askAssistant() {
            const query = document.getElementById('ai-query').value;
            if (!query) return;

            const resDiv = document.getElementById('ai-response');
            resDiv.innerHTML = '<span class="loader"></span> Analyzing...';
            resDiv.style.display = 'block';

            try {
                const res = await fetch(`/api/venue/assistant?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                resDiv.innerHTML = `<strong>Assistant:</strong><br>${data.analysis || data.fallback}`;
            } catch (e) {
                resDiv.innerHTML = "AI Assistant temporarily unavailable.";
            }
        }

        function googleAuth() {
            const btn = document.getElementById('auth-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Verifying...';
            
            setTimeout(() => {
                document.getElementById('user-profile').style.display = 'flex';
                btn.style.display = 'none';
                showNotification("Google Identity", "Authentication Successful. Welcome to VenueCrowd.");
            }, 1200);
        }

        async function getSmartRoute() {
            const from = document.getElementById('start-node').value;
            const to = document.getElementById('end-node').value;
            const btn = event.currentTarget;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Optimizing...';

            try {
                const res = await fetch(`/api/venue/route?from=${from}&to=${to}`);
                const data = await res.json();
                
                const panel = document.getElementById('route-panel');
                const text = document.getElementById('route-text');
                
                text.innerHTML = `Path: <strong>${data.pathIds.join(' → ')}</strong> <br><br>Benefit: <span style="color: var(--secondary)">${data.benefit}</span>`;
                panel.style.display = 'block';
            } catch (e) {
                showNotification("Error", "Routing computation failed.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Find Smartest Route';
            }
        }

        async function syncCalendar() {
            try {
                const res = await fetch('/api/calendar/sync', { method: 'POST' });
                const data = await res.json();
                showNotification(data.error ? "Sync Alert" : "Calendar Update", data.error || "Event successfully synced.");
            } catch (e) {
                showNotification("Sync Error", "Could not connect to Google Calendar.");
            }
        }

        async function simulateAlert() {
            try {
                const res = await fetch('/api/venue/alert');
                const data = await res.json();
                showNotification(data.alert.title, data.alert.message);
            } catch (e) { /* ignore */ }
        }

        function showNotification(title, msg) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-title').innerText = title;
            document.getElementById('notif-msg').innerText = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 6000);
        }

        function toggleAdminModal(show) {
            document.getElementById('admin-modal').style.display = show ? 'flex' : 'none';
        }

        async function submitAdminUpdate() {
            const zoneId = document.getElementById('admin-zone').value;
            const density = document.getElementById('admin-density').value;
            
            toggleAdminModal(false);
            try {
                await fetch('/api/venue/admin/density', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zoneId, density: parseInt(density) })
                });
                fetchData();
                showNotification("Admin Success", `Zone ${zoneId} density updated to ${density}%.`);
            } catch (e) {
                showNotification("Admin Error", "Update failed.");
            }
        }

        loadGoogleMaps();
        setInterval(fetchData, 30000); 
    </script>
</body>
</html>
