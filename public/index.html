<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenueCrowd | Smart Event Optimizer</title>
    
    <!-- Meta tags for SEO & Security -->
    <meta name="description" content="Revolutionizing event experiences with real-time crowd management and navigation using Google Maps API.">
    <meta name="theme-color" content="#0f172a">

    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #22d3ee;
            --bg-dark: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.1);
            --focus-ring: 2px solid var(--secondary);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s, transform 0.1s;
        }

        /* Accessibility: Visual focus for keyboard users */
        *:focus-visible {
            outline: var(--focus-ring);
            outline-offset: 2px;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* Semantic Header */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            font-weight: 600;
        }

        /* Responsive Layout */
        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* Accessibility: Semantic Sidebar */
        nav.sidebar {
            background: var(--bg-dark);
            border-right: 1px solid var(--glass);
            overflow-y: auto;
            padding: 1.5rem;
        }

        .panel {
            background: var(--surface);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass);
            backdrop-filter: blur(5px);
        }

        .panel-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--glass);
            padding-bottom: 0.5rem;
        }

        /* Accessible Lists */
        .zone-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .density-tag {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .low { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .high { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* Interactive Map Area */
        #map-container { position: relative; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }

        .floating-controls {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 10;
        }

        /* Accessible Buttons */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .btn:active { transform: translateY(0); }

        .btn-secondary { background: var(--surface); border: 1px solid var(--glass); }
        .btn-calendar { background: #4285F4; }

        /* Notifications (aria-live) */
        #notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-dark);
            padding: 1.25rem;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
            width: 320px;
        }

        #notification.show { transform: translateY(0); }

        /* Form Styling */
        label { display: block; font-size: 0.8rem; margin-bottom: 0.25rem; color: var(--text-muted); }
        select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--glass);
            padding: 0.5rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 1rem;
            outline: none;
            cursor: pointer;
        }

        .loader {
            width: 12px; height: 12px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile Optimization */
        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar { position: absolute; bottom: 0; width: 100%; height: 320px; z-index: 20; border-top: 1px solid var(--glass); padding: 1rem; }
        }
    </style>
</head>
<body>

    <header role="banner">
        <div class="logo">VenueCrowd <span aria-hidden="true" style="font-size: 0.9rem; opacity: 0.5;">v2.0 Google Optimized</span></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="user-profile" style="display: none; align-items: center; gap: 8px;">
                <img src="https://lh3.googleusercontent.com/a/default-user" alt="Profile" style="width: 32px; height: 32px; border-radius: 50%;">
                <span id="user-name" style="font-size: 0.85rem;">Attendee</span>
            </div>
            <button class="btn btn-secondary" onclick="googleAuth()" id="auth-btn">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" style="width: 16px;" alt="Google Logo"> Sign In
            </button>
            <div id="connection-status" role="status" aria-live="polite">
                <span class="loader"></span> Connecting...
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" aria-label="Venue Operations Sidebar">
            <section class="panel">
                <h2 class="panel-title">🧠 Google AI Assistant</h2>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="ai-query" aria-label="Ask AI Assistant" placeholder="Ask AI: 'I'm hungry, avoid crowds'" style="flex:1; background: var(--surface); color: white; border: 1px solid var(--glass); padding: 8px; border-radius: 6px; font-size: 0.8rem;">
                    <button class="btn" aria-label="Submit query to AI" onclick="askAssistant()" style="padding: 8px;">🚀</button>
                </div>
                <div id="ai-response" style="margin-top: 10px; font-size: 0.75rem; color: var(--secondary); background: rgba(34, 211, 238, 0.05); padding: 8px; border-radius: 6px; display: none;"></div>
            </section>

            <section class="panel">
                <h2 class="panel-title">Crowd Density</h2>
                <div id="crowd-list" aria-live="polite">
                    <p style="color: var(--text-muted)">Tracking 6 venue zones...</p>
                </div>
            </section>

            <section class="panel">
                <h2 class="panel-title">Event Schedule</h2>
                <div style="font-size: 0.9rem; margin-bottom: 1rem;">
                    <strong>Championship Final 🏆</strong><br>
                    <span style="color: var(--text-muted)">Sunday, May 10th - Kickoff 18:00</span>
                </div>
                <button class="btn btn-calendar" style="width: 100%" onclick="syncCalendar()" aria-label="Sync event to Google Calendar">
                    <span>📅</span> Add to Google Calendar
                </button>
            </section>

            <section class="panel">
                <h2 class="panel-title">Smart Route</h2>
                <label for="start-node">Current Point</label>
                <select id="start-node">
                    <option value="gate_a">Main Gate A</option>
                    <option value="gate_b">North Gate B</option>
                </select>
                <label for="end-node">Destination</label>
                <select id="end-node">
                    <option value="seating_zone_1">Lower Tier Seating</option>
                    <option value="food_court">Central Food Court</option>
                </select>
                <button class="btn" style="width: 100%" onclick="getSmartRoute()" aria-label="Calculate optimized route">
                    🚀 Find Optimized Route
                </button>

                <div id="route-panel" style="display: none; margin-top: 1rem; padding: 10px; background: rgba(99, 102, 241, 0.1); border-radius: 8px;">
                    <strong style="color: var(--secondary)">Recommendation Found</strong>
                    <p id="route-text" style="font-size: 0.8rem; line-height: 1.4; margin-top: 5px;"></p>
                </div>
            </section>
        </nav>

        <!-- Dynamic Map View -->
        <div id="map-container">
            <div id="map" aria-label="Interactive map showing venue zones and crowd density"></div>
            <div class="floating-controls">
                <button class="btn btn-secondary" onclick="simulateAlert()" aria-label="Simulate emergency traffic alert">
                    🚨 Admin Alert
                </button>
                <button class="btn" onclick="openAdmin()" aria-label="Open administration density simulation">
                    ⚙️ Simulation Admin
                </button>
            </div>
        </div>
    </main>

    <!-- Accessible Notification Overlay -->
    <div id="notification" role="alert" aria-live="assertive">
        <h3 id="notif-title" style="font-size: 1rem; margin-bottom: 4px;">Notice</h3>
        <p id="notif-msg" style="color: var(--text-muted); font-size: 0.85rem;"></p>
    </div>

    <!-- Google Maps Loader -->
    <script>
        const GOOGLE_API_KEY = "REPLACE_WITH_YOUR_KEY"; 
        
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_API_KEY}&callback=initMap`;
        script.async = true;
        document.head.appendChild(script);

        let map, markers = [];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -37.8198, lng: 144.9834 },
                zoom: 17,
                disableDefaultUI: true,
                styles: [
                  { "elementType": "geometry", "stylers": [{ "color": "#1e293b" }] },
                  { "elementType": "labels.text.fill", "stylers": [{ "color": "#94a3b8" }] },
                  { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#334155" }] }
                ]
            });
            fetchData();
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/venue/crowd');
                const data = await response.json();
                updateUI(data);
                document.getElementById('connection-status').innerHTML = "🟢 Venue Engine Live";
            } catch (e) {
                document.getElementById('connection-status').innerHTML = "🔴 Data Stream Offline";
            }
        }

        function updateUI(zones) {
            const list = document.getElementById('crowd-list');
            list.innerHTML = '';
            markers.forEach(m => m.setMap(null));
            markers = [];

            zones.forEach(zone => {
                const card = document.createElement('article');
                card.className = 'zone-card';
                card.innerHTML = `
                    <span style="font-weight: 500">${zone.name}</span>
                    <span class="density-tag ${zone.status.toLowerCase()}">${zone.status}</span>
                `;
                list.appendChild(card);

                if (map) {
                    const marker = new google.maps.Marker({
                        position: { lat: -37.8198 + (Math.random() * 0.002 - 0.001), lng: 144.9834 + (Math.random() * 0.004 - 0.002) },
                        map: map,
                        title: `${zone.name} - ${zone.status} Density`,
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            scale: 8 + (zone.density / 8),
                            fillColor: zone.status === 'High' ? "#ef4444" : (zone.status === 'Medium' ? "#f59e0b" : "#10b981"),
                            fillOpacity: 0.6,
                            strokeWeight: 1,
                            strokeColor: "#fff"
                        }
                    });
                    markers.push(marker);
                }
            });
        }

        async function askAssistant() {
            const query = document.getElementById('ai-query').value;
            if (!query) return;

            const resDiv = document.getElementById('ai-response');
            resDiv.innerHTML = '<span class="loader"></span> Thinking...';
            resDiv.style.display = 'block';

            try {
                const res = await fetch(`/api/venue/assistant?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                resDiv.innerHTML = `<strong>Assistant:</strong><br>${data.analysis || data.fallback}`;
            } catch (e) {
                resDiv.innerHTML = "Assistant is offline.";
            }
        }

        function googleAuth() {
            const btn = document.getElementById('auth-btn');
            btn.innerHTML = '<span class="loader"></span> Authorizing...';
            
            setTimeout(() => {
                document.getElementById('user-profile').style.display = 'flex';
                btn.style.display = 'none';
                showNotification("Google Identity", "Welcome back, Attendee!");
            }, 1000);
        }

        async function getSmartRoute() {
            const from = document.getElementById('start-node').value;
            const to = document.getElementById('end-node').value;
            
            const btn = event.currentTarget;
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Calculating...';

            try {
                const res = await fetch(`/api/venue/route?from=${from}&to=${to}`);
                const data = await res.json();
                
                const panel = document.getElementById('route-panel');
                const text = document.getElementById('route-text');
                
                text.innerHTML = `Path: <strong>${data.pathIds.join(' → ')}</strong> <br>Reason: ${data.benefit}`;
                panel.style.display = 'block';
            } catch (e) {
                alert("Smart routing unavailable.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Find Optimized Route';
            }
        }

        async function syncCalendar() {
            const res = await fetch('/api/calendar/sync', { method: 'POST' });
            const data = await res.json();
            showNotification(data.error ? "Sync Simulator" : "Calendar Synced", data.error || "Event added!");
        }

        async function simulateAlert() {
            const res = await fetch('/api/venue/alert');
            const data = await res.json();
            showNotification(data.alert.title, data.alert.message);
        }

        function showNotification(title, msg) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-title').innerText = title;
            document.getElementById('notif-msg').innerText = msg;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 6000);
        }

        function openAdmin() {
            const density = prompt("Simulate HIGH density for Gate A? (Enter % score 0-100)", "98");
            if (density) {
                fetch('/api/venue/admin/density', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zoneId: 'gate_a', density: parseInt(density) })
                }).then(() => fetchData());
            }
        }

        setInterval(fetchData, 20000); // 20s refresh
    </script>
</body>
</html>
